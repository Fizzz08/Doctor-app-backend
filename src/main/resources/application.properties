# ========== Actuator Endpoint Exposure ==========
# Expose specific actuator endpoints over HTTP
management.endpoints.web.exposure.include=health,info,metrics,httptrace

# Optional: expose ALL endpoints (not recommended for production)
# management.endpoints.web.exposure.include=*

# Show detailed health status (not just UP/DOWN)
management.endpoint.health.show-details=always

# Enable metrics collection for HTTP requests
management.metrics.enable.http.server.requests=true

# Enable HTTP trace (last 100 requests by default)
management.endpoint.httptrace.enabled=true

# Server port (optional)
server.port=8080